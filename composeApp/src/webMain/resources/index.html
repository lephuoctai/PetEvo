<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#4CAF50">
    <meta name="description" content="Pet Evolution - Hardcore Focus App with a Virtual Pet">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>PetEvo</title>
    <link type="text/css" rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
</head>
<body style="text-align: center; align-content: center">
<div id="landscape-blocker">
    <div class="icon">📱</div>
    <div class="msg">Please rotate your device to portrait mode</div>
</div>
<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 50 50" role="presentation">
    <circle cx="25" cy="25" r="20" stroke="#ccc" stroke-width="4" fill="none"/>
    <circle cx="25" cy="25" r="20" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"
            stroke-dasharray="90 125">
        <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s"
                          repeatCount="indefinite"/>
    </circle>
</svg>
<script type="application/javascript" src="composeApp.js"></script>
<script>
// Request true fullscreen on first user interaction (hides status bar on mobile browsers)
function requestFullscreen() {
    var el = document.documentElement;
    var rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
    if (rfs) {
        rfs.call(el).catch(function(){});
    }
    // Only need to do this once
    document.removeEventListener('click', requestFullscreen);
    document.removeEventListener('touchstart', requestFullscreen);
}
// Don't request if already in standalone/fullscreen PWA mode
if (!window.matchMedia('(display-mode: fullscreen)').matches &&
    !window.matchMedia('(display-mode: standalone)').matches &&
    !window.navigator.standalone) {
    document.addEventListener('click', requestFullscreen, {once: true});
    document.addEventListener('touchstart', requestFullscreen, {once: true});
}

// Lock orientation to portrait (works in fullscreen PWA)
try { screen.orientation.lock('portrait').catch(function(){}); } catch(e) {}

if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js').then(function(reg) {
            console.log('SW registered:', reg.scope);
        }).catch(function(err) {
            console.log('SW registration failed:', err);
        });
    });
}
</script>
</body>
</html>
